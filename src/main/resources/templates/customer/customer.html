<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">✂️ Salon Booking</a>
        <div class="navbar-nav ms-auto">
            <span class="nav-link text-white">Welcome, <span th:text="${user.fullName}"></span></span>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">📅 Book Appointment</h5>
                    <p class="card-text">Schedule a new service appointment</p>
                    <a href="/customer/book" class="btn btn-primary">Book Now</a>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5>My Recent Bookings</h5>
                </div>
                <div class="card-body">
                    <div th:if="${bookings.empty}" class="alert alert-info">
                        No bookings yet. <a href="/customer/book">Book now!</a>
                    </div>
                    <div th:unless="${bookings.empty}">
                        <table class="table">
                            <thead>
                            <tr><th>Service</th><th>Staff</th><th>Date</th><th>Time</th><th>Status</th><th>Action</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="booking : ${bookings}">
                                <td th:text="${booking.service.name}"></td>
                                <td th:text="${booking.staff.name}"></td>
                                <td th:text="${booking.date}"></td>
                                <td th:text="${booking.time}"></td>
                                <td>
                                            <span class="badge" th:class="${booking.status == 'confirmed' ? 'bg-success' : 'bg-warning'}"
                                                  th:text="${booking.status}"></span>
                                </td>
                                <td>
                                    <a th:if="${booking.status == 'pending'}"
                                       th:href="@{/customer/cancel/{id}(id=${booking.id})}"
                                       class="btn btn-sm btn-danger">Cancel</a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
