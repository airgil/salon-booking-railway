<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">✂️ Salon Booking</a>
        <div class="navbar-nav ms-auto">
            <span class="nav-link text-white">Welcome, <span th:text="${user.fullName}"></span></span>
            <a class="nav-link" href="/customer/dashboard">Dashboard</a>
            <a class="nav-link active" href="/customer/profile">Profile</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>My Profile</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form action="/customer/profile/update" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" th:value="${user.username}" disabled>
        </div>
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" th:value="${user.email}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control" th:value="${user.phone}">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/customer/dashboard" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>
