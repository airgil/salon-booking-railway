<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">✂️ Salon Booking</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/customer/dashboard">Dashboard</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>Book an Appointment</h4>
                </div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form action="/customer/book" method="post">
                        <div class="mb-3">
                            <label class="form-label">Select Service</label>
                            <select name="serviceId" class="form-control" required>
                                <option th:each="service : ${services}"
                                        th:value="${service.id}"
                                        th:text="${service.name} + ' - $' + ${service.price} + ' (' + ${service.duration} + ' min)'">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Select Staff</label>
                            <select name="staffId" class="form-control" required>
                                <option th:each="staff : ${staff}"
                                        th:value="${staff.id}"
                                        th:text="${staff.name} + ' - ' + ${staff.specialty}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" name="date" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Time</label>
                            <select name="time" class="form-control" required>
                                <option value="09:00:00">09:00 AM</option>
                                <option value="10:00:00">10:00 AM</option>
                                <option value="11:00:00">11:00 AM</option>
                                <option value="14:00:00">02:00 PM</option>
                                <option value="15:00:00">03:00 PM</option>
                                <option value="16:00:00">04:00 PM</option>
                                <option value="17:00:00">05:00 PM</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Book Appointment</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
