<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">✂️ Salon Booking</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/customer/dashboard">Dashboard</a>
            <a class="nav-link" href="/my-bookings">My Bookings</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white text-center">
                    <h4><i class="bi bi-qr-code"></i> Booking QR Code</h4>
                </div>
                <div class="card-body text-center">
                    <img th:src="${qrImageUrl}" alt="QR Code" class="img-fluid" style="max-width: 250px;">

                    <div class="mt-3">
                        <p><strong>Booking #<span th:text="${booking.id}"></span></strong></p>
                        <p th:text="${booking.service != null ? booking.service.serviceName : 'N/A'}"></p>
                        <p th:text="${booking.date} + ' at ' + ${booking.time}"></p>
                        <p>
                            <span class="badge"
                                  th:class="${booking.status == 'confirmed' ? 'bg-success' :
                                            booking.status == 'pending' ? 'bg-warning' :
                                            booking.status == 'cancelled' ? 'bg-danger' : 'bg-secondary'}"
                                  th:text="${booking.status}"></span>
                        </p>
                    </div>

                    <a href="/my-bookings" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>
                    <button onclick="window.print()" class="btn btn-primary">
                        <i class="bi bi-printer"></i> Print
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
