<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Check-in Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body">
                    <h1 class="text-success"><i class="bi bi-check-circle-fill"></i></h1>
                    <h3 th:text="${message}">Check-in Successful!</h3>
                    <hr>
                    <p><strong>Booking #<span th:text="${booking.id}"></span></strong></p>
                    <p th:text="${booking.service != null ? booking.service.serviceName : 'N/A'}"></p>
                    <p th:text="${booking.date} + ' at ' + ${booking.time}"></p>
                    <a href="/" class="btn btn-primary">Go Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
