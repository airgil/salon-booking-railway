<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .hero {
            text-align: center;
            padding: 80px 0;
            color: white;
        }
        .card {
            border-radius: 15px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .btn-book {
            background: #ff6b6b;
            color: white;
            padding: 12px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
        }
        .btn-book:hover {
            background: #ff5252;
            color: white;
        }
        .price {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">✂️ Salon Booking System</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/login">Login</a>
            <a class="nav-link" href="/register">Register</a>
        </div>
    </div>
</nav>

<div class="hero">
    <div class="container">
        <h1 class="display-4">Welcome to Salon Booking System</h1>
        <p class="lead">Book your appointment online - Anywhere, Anytime!</p>
        <a href="/register" class="btn btn-book mt-3">Get Started →</a>
    </div>
</div>

<div class="container mb-5">
    <h2 class="text-center text-white mb-4">Our Services</h2>
    <div class="row">
        <div class="col-md-4 mb-4" th:each="service : ${services}">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5 class="card-title" th:text="${service.name}">Service Name</h5>
                    <p class="card-text" th:text="${service.description}">Description</p>
                    <p class="price" th:text="'$' + ${service.price}">$25</p>
                    <p class="text-muted" th:text="${service.duration} + ' minutes'">30 min</p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3">
    <p>&copy; 2024 Salon Booking System. All rights reserved.</p>
</footer>
</body>
</html>
