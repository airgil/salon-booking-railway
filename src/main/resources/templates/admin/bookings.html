<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Bookings - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-pending { background-color: #ffc107; color: #000; }
        .status-confirmed { background-color: #17a2b8; color: #fff; }
        .status-completed { background-color: #28a745; color: #fff; }
        .status-cancelled { background-color: #dc3545; color: #fff; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">✂️ Admin Panel</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/admin/dashboard">Dashboard</a>
            <a class="nav-link active" href="/admin/bookings">Bookings</a>
            <a class="nav-link" href="/admin/services">Services</a>
            <a class="nav-link" href="/admin/staff">Staff</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">All Bookings</h4>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Service</th>
                        <th>Staff</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="${booking.id}">1</td>
                        <td th:text="${booking.user != null ? booking.user.fullName : 'Unknown'}">John Doe</td>
                        <td th:text="${booking.service != null ? booking.service.serviceName : 'N/A'}">Haircut</td>
                        <td th:text="${booking.staff != null ? booking.staff.staffName : 'TBD'}">John Smith</td>
                        <td th:text="${booking.date}">2024-01-15</td>
                        <td th:text="${booking.time}">10:00</td>
                        <td>
                            <span class="badge"
                                  th:class="${booking.status == 'pending' ? 'bg-warning' :
                                            booking.status == 'confirmed' ? 'bg-info' :
                                            booking.status == 'completed' ? 'bg-success' : 'bg-danger'}"
                                  th:text="${booking.status}">pending</span>
                        </td>
                        <td>
                            <form action="/admin/booking/update" method="post" class="d-inline">
                                <input type="hidden" name="id" th:value="${booking.id}">
                                <select name="status" class="form-select form-select-sm d-inline w-auto" onchange="this.form.submit()">
                                    <option value="pending" th:selected="${booking.status == 'pending'}">Pending</option>
                                    <option value="confirmed" th:selected="${booking.status == 'confirmed'}">Confirmed</option>
                                    <option value="completed" th:selected="${booking.status == 'completed'}">Completed</option>
                                    <option value="cancelled" th:selected="${booking.status == 'cancelled'}">Cancelled</option>
                                </select>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${bookings == null or bookings.isEmpty()}">
                        <td colspan="8" class="text-center">No bookings found</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
