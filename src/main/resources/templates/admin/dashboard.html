<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">✂️ Admin Panel</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="alert alert-success">
        ✅ Welcome Admin! You are logged into the administration panel.
    </div>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card text-center">
                <div class="card-body">
                    <h3 th:text="${totalBookings}">0</h3>
                    <p>Total Bookings</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card text-center">
                <div class="card-body">
                    <h3 th:text="${pendingCount}">0</h3>
                    <p>Pending Bookings</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card text-center">
                <div class="card-body">
                    <h3 th:text="${todayCount}">0</h3>
                    <p>Today's Appointments</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5>Quick Actions</h5>
        </div>
        <div class="card-body">
            <a href="/admin/bookings" class="btn btn-primary">Manage Bookings</a>
            <a href="/admin/services" class="btn btn-success">Manage Services</a>
            <a href="/admin/staff" class="btn btn-info">Manage Staff</a>
        </div>
    </div>
</div>
</body>
</html>
