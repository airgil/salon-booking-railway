<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Staff - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">✂️ Admin Panel</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/admin/dashboard">Dashboard</a>
            <a class="nav-link" href="/admin/bookings">Bookings</a>
            <a class="nav-link" href="/admin/services">Services</a>
            <a class="nav-link active" href="/admin/staff">Staff</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Add New Staff</h5>
                </div>
                <div class="card-body">
                    <form action="/admin/staff/add" method="post">
                        <div class="mb-3">
                            <label class="form-label">Staff Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Specialty</label>
                            <input type="text" name="specialty" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Add Staff</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Existing Staff</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Specialty</th>
                                <th>Available</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="staff : ${staff}">
                                <td th:text="${staff.id}">1</td>
                                <td th:text="${staff.name}">John Smith</td>
                                <td th:text="${staff.specialty}">Hair Stylist</td>
                                <td>
                                            <span class="badge" th:class="${staff.available ? 'bg-success' : 'bg-danger'}"
                                                  th:text="${staff.available ? 'Yes' : 'No'}">Yes</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
