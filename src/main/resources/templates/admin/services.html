<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Services - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">✂️ Admin Panel</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/admin/dashboard">Dashboard</a>
            <a class="nav-link" href="/admin/bookings">Bookings</a>
            <a class="nav-link active" href="/admin/services">Services</a>
            <a class="nav-link" href="/admin/staff">Staff</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Add New Service</h5>
                </div>
                <div class="card-body">
                    <form action="/admin/service/add" method="post">
                        <div class="mb-3">
                            <label class="form-label">Service Name</label>
                            <input type="text" name="serviceName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Duration (minutes)</label>
                            <input type="number" name="duration" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price ($)</label>
                            <input type="number" step="0.01" name="price" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Add Service</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Existing Services</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Duration</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="service : ${services}">
                                <td th:text="${service.id}">1</td>
                                <td th:text="${service.serviceName}">Haircut</td>
                                <td th:text="${service.duration}">30 min</td>
                                <td th:text="'$' + ${service.price}">$25</td>
                                <td>
                                    <a th:href="@{/admin/service/delete/{id}(id=${service.id})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Delete this service?')">Delete</a>
                                </td>
                            </tr>
                            <tr th:if="${services == null or services.isEmpty()}">
                                <td colspan="5" class="text-center">No services found</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
