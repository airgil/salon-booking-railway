# ==========================================
# RAILWAY DEPLOYMENT CONFIGURATION
# ==========================================

# Server Configuration - CRITICAL for Railway
server.address=0.0.0.0
server.port=${PORT:8080}
server.error.include-message=always

# Database Configuration - Uses Railway environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/salon_booking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:@Brav0123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.connectionTimeout=30000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Actuator Health Endpoint - for Railway healthchecks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN