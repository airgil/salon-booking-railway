# src/main/resources/application.properties

# Application
spring.application.name=salon-booking

# Database Configuration - Railway will inject these automatically
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/salon_booking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# Logging
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN