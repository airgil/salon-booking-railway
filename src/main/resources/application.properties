# Server Configuration - CRITICAL for Render
server.address=0.0.0.0
server.port=${PORT:8080}

# PostgreSQL Database Configuration for Render
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator Health Endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# ==========================================
# EMAIL CONFIGURATION - FIXED
# ==========================================

# Email enabled flag (default: false)
app.email.enabled=${APP_EMAIL_ENABLED:false}

# Email server settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email sender details
app.email.from=noreply@salonbooking.com
app.email.support=support@salonbooking.com